name: Build Android APK

on:
  push:
    branches: [main, master]
    paths:
      - 'khetwala-app/**'
  pull_request:
    branches: [main, master]
    paths:
      - 'khetwala-app/**'
  workflow_dispatch:

jobs:
  build-apk:
    name: Build Debug APK
    runs-on: ubuntu-latest
    timeout-minutes: 60
    permissions:
      contents: read

    steps:
      # ── Checkout ───────────────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4

      # ── Java 17 ────────────────────────────────────────────────────────────
      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      # ── Node.js ────────────────────────────────────────────────────────────
      - name: Set up Node.js 22
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'
          cache-dependency-path: khetwala-app/package-lock.json

      # ── Gradle cache ───────────────────────────────────────────────────────
      - name: Cache Gradle packages
        uses: actions/cache@v4
        with:
          path: |
            ~/.gradle/caches
            ~/.gradle/wrapper
          key: ${{ runner.os }}-gradle-${{ hashFiles('khetwala-app/android/**/*.gradle*', 'khetwala-app/android/gradle/wrapper/gradle-wrapper.properties') }}
          restore-keys: |
            ${{ runner.os }}-gradle-

      # ── Install JS dependencies ─────────────────────────────────────────────
      - name: Install Node dependencies
        working-directory: khetwala-app
        run: npm ci

      # ── Create .env if not present ─────────────────────────────────────────
      - name: Create .env for build
        working-directory: khetwala-app
        run: |
          if [ ! -f .env ]; then
            cat > .env <<'EOF'
          EXPO_PUBLIC_BACKEND_URL=http://10.0.2.2:8000
          EOF
          fi

      # ── Android SDK local.properties ───────────────────────────────────────
      - name: Write local.properties
        working-directory: khetwala-app/android
        run: echo "sdk.dir=$ANDROID_HOME" > local.properties

      # ── Make gradlew executable ─────────────────────────────────────────────
      - name: Make gradlew executable
        working-directory: khetwala-app/android
        run: chmod +x gradlew

      # ── Build debug APK ─────────────────────────────────────────────────────
      - name: Build debug APK
        working-directory: khetwala-app/android
        run: ./gradlew assembleDebug --no-daemon --stacktrace
        env:
          EXPO_PUBLIC_BACKEND_URL: http://10.0.2.2:8000

      # ── Upload APK artifact ─────────────────────────────────────────────────
      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: khetwala-debug-apk
          path: khetwala-app/android/app/build/outputs/apk/debug/app-debug.apk
          retention-days: 30

      # ── Print APK info ──────────────────────────────────────────────────────
      - name: Show APK file info
        run: |
          APK=khetwala-app/android/app/build/outputs/apk/debug/app-debug.apk
          if [ -f "$APK" ]; then
            echo "✅ APK built successfully"
            ls -lh "$APK"
          else
            echo "❌ APK not found!"
            exit 1
          fi
